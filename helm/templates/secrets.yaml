apiVersion: v1
kind: Secret
metadata:
  name: healthcare-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  # ── Database ─────────────────────────────────────
  DB_HOST: {{ .Values.secrets.dbHost | quote }}
  DB_PORT: "5432"
  DB_NAME: {{ .Values.secrets.dbName | quote }}
  DB_USER: {{ .Values.secrets.dbUser | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  # ── Redis ─────────────────────────────────────────
  REDIS_HOST: {{ .Values.secrets.redisHost | quote }}
  REDIS_PORT: "6379"
  REDIS_URL: "redis://{{ .Values.secrets.redisHost }}:6379"
  # ── CORS ──────────────────────────────────────────
  CORS_ORIGIN: {{ .Values.secrets.corsOrigin | quote }}
  # ── Access Token ──────────────────────────────────
  ACCESS_TOKEN_SECRET: {{ .Values.secrets.accessTokenSecret | quote }}
  ACCESS_TOKEN_EXPIRY: {{ .Values.secrets.accessTokenExpiry | quote }}
  # ── S3 ────────────────────────────────────────────
  AWS_REGION: {{ .Values.secrets.awsRegion | quote }}
  AWS_BUCKET_NAME: {{ .Values.secrets.awsBucketName | quote }}