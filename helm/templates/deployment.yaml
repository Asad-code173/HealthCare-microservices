{{- range $name, $svc := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}
    {{- include "healthcare.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ include "healthcare.image" (dict "global" $.Values.global "image" $svc.image) }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ $svc.port }}
          resources:
            requests:
              cpu: {{ $.Values.resources.requests.cpu }}
              memory: {{ $.Values.resources.requests.memory }}
            limits:
              cpu: {{ $.Values.resources.limits.cpu }}
              memory: {{ $.Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: healthcare-secrets
            {{- if eq $name "auth-service" }}
            - secretRef:
                name: auth-secrets
            {{- end }}
          env:
            - name: PORT                  # ✅ har service ko apna port milega
              value: {{ $svc.port | quote }}
---
{{- end }}