# helm/values.yaml
global:
  registry: "942617679324.dkr.ecr.us-east-1.amazonaws.com"
  imageTag: "88bff2660f29"
  namespace: healthcare

services:
  frontend:
    port: 3000
    replicas: 1
    image: eks-healthcare-frontend


  auth-service:
    port: 8001
    replicas: 1
    image: eks-healthcare-auth-service
  doctor-service:
    port: 8002
    replicas: 1
    image: eks-healthcare-doctor-service

  patient-service:
    port: 8003
    replicas: 1
    image: eks-healthcare-patient-service

  appointment-service:
    port: 8004
    replicas: 1
    image: eks-healthcare-appointment-service

ingress:
  enabled: true
  className: alb
  host: ""
  securityGroupId: ""
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  cpuUtilization: 70