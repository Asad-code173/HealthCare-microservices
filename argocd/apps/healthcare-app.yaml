apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: healthcare
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Asad-code173/HealthCare-microservices
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: healthcare
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:            
      limit: 3
      backoff:
        duration: 30s
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true