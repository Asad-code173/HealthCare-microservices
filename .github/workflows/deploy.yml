name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "front-end/**"
      - "services/**"
      - "argocd/**"
      - "helm/charts/**"
      - "helm/templates/**"
      - "helm/Chart.yaml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override. Leave blank to use commit SHA.
        required: false
        type: string

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'eks-healthcare' }}
  CLUSTER_NAME: ${{ vars.CLUSTER_NAME || 'healthcare-eks' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}

concurrency:
  group: eks-healthcare-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + Scan + Push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required config
        env:
          DB_PASS: ${{ secrets.TF_VAR_db_password }}
          ACCESS_TOK: ${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOK: ${{ secrets.REFRESH_TOKEN_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${AWS_ROLE_TO_ASSUME}" ]] || { echo "AWS_ROLE_TO_ASSUME required";   exit 1; }
          [[ -n "${DB_PASS}" ]]            || { echo "TF_VAR_db_password required";   exit 1; }
          [[ -n "${ACCESS_TOK}" ]]         || { echo "ACCESS_TOKEN_SECRET required";  exit 1; }
          [[ -n "${REFRESH_TOK}" ]]        || { echo "REFRESH_TOKEN_SECRET required"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Decide image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image_tag="${{ github.event.inputs.image_tag || '' }}"
          [[ -z "${image_tag}" ]] && image_tag="${GITHUB_SHA::12}"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Get AWS account ID
        id: aws
        run: |
          echo "account_id=$(aws sts get-caller-identity \
            --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, scan, push images
        shell: bash
        env:
          ACCOUNT_ID: ${{ steps.aws.outputs.account_id }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          registry="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          services=(
            "frontend:front-end"
            "auth-service:services/auth"
            "doctor-service:services/doctors"
            "patient-service:services/patients"
            "appointment-service:services/appointments"
            "gateway-service:services/gateway"
          )
          for entry in "${services[@]}"; do
            name="${entry%%:*}"
            path="${entry#*:}"
            image_uri="${registry}/${PROJECT_NAME}-${name}:${IMAGE_TAG}"

            echo "▶ Building ${name}"
            docker build --tag "${image_uri}" "${path}"

            echo "▶ Scanning ${name} with Trivy"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image \
              --exit-code 1 \
              --severity CRITICAL \
              --no-progress \
              "${image_uri}"

            echo "▶ Pushing ${name}"
            docker push "${image_uri}"
          done

      - name: Update image tag in Helm values
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          ACCOUNT_ID: ${{ steps.aws.outputs.account_id }}
        run: |
          git pull --rebase origin main
          sed -i "s|imageTag:.*|imageTag: \"${IMAGE_TAG}\"|" helm/values.yaml
          sed -i \
            "s|registry:.*|registry: \"${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com\"|" \
            helm/values.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add helm/values.yaml
          if ! git diff --cached --quiet; then
            git commit -m "ci: update image tag to ${IMAGE_TAG}"
            git push
          fi

      - name: Update secrets in Helm values
        env:
          DB_PASSWORD: ${{ secrets.TF_VAR_db_password }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          git pull --rebase origin main
          sed -i "s|dbPassword:.*|dbPassword: \"${DB_PASSWORD}\"|" helm/values.yaml
          sed -i "s|accessTokenSecret:.*|accessTokenSecret: \"${ACCESS_TOKEN_SECRET}\"|" helm/values.yaml
          sed -i "s|refreshTokenSecret:.*|refreshTokenSecret: \"${REFRESH_TOKEN_SECRET}\"|" helm/values.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add helm/values.yaml
          if ! git diff --cached --quiet; then
            git commit -m "ci: update secrets"
            git push
          fi

     
      - name: Inject AWS credentials directly
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${CLUSTER_NAME}"
          kubectl create secret generic aws-credentials \
            --from-literal=AWS_ACCESS_KEY_ID="${S3_ACCESS_KEY_ID}" \
            --from-literal=AWS_SECRET_ACCESS_KEY="${S3_SECRET_ACCESS_KEY}" \
            --namespace healthcare \
            --dry-run=client -o yaml | kubectl apply -f -
      

      - name: Get frontend URL
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${CLUSTER_NAME}"
          echo "⏳ Waiting for ingress URL..."
          for i in $(seq 1 20); do
            url=$(kubectl get ingress -A \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' \
              2>/dev/null || true)
            if [[ -n "${url}" ]]; then
              {
                echo "## ✅ Deploy complete"
                echo "- Image tag: ${{ steps.meta.outputs.image_tag }}"
                echo "- Project: ${PROJECT_NAME}"
                echo "- Region: ${AWS_REGION}"
                echo "## 🌐 Frontend URL"
                echo "http://${url}"
                echo "## 📊 Grafana URL"
                echo "http://${url}/grafana"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Attempt ${i}/5 — waiting 20s..."
            sleep 20
          done
          {
            echo "## Deploy complete"
            echo "- Image tag: ${{ steps.meta.outputs.image_tag }}"
            echo "- Project: ${PROJECT_NAME}"
            echo "- Region: ${AWS_REGION}"
            echo "## ⚠️ URLs not available yet"
            echo "Run: kubectl get ingress -A"
          } >> "$GITHUB_STEP_SUMMARY"
