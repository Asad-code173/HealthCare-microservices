name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.8

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

      - name: Initialize Terraform without backend
        run: terraform init -backend=false -input=false
        working-directory: infra/terraform

      - name: Validate Terraform
        run: terraform validate
        working-directory: infra/terraform

  containers:
    name: Docker Compose And Image Builds
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate docker-compose file
        run: docker compose config

      - name: Build all service images
        shell: bash
        run: |
          set -euo pipefail

          services=(
            "frontend:front-end"
            "gateway:services/gateway"
            "auth-service:services/auth"
            "doctor-service:services/doctors"
            "patient-service:services/patients"
            "appointment-service:services/appointments"
          )

          for entry in "${services[@]}"; do
            name="${entry%%:*}"
            path="${entry#*:}"
            echo "Building ${name} from ${path}"
            docker build --tag "local/${name}:ci" "${path}"
          done

